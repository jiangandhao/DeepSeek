server:
  port: 8080

spring:
  application:
    name: health-backend
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/health?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true}
    username: ${SPRING_DATASOURCE_USERNAME:health}
    password: ${SPRING_DATASOURCE_PASSWORD:health123456}
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:6379}
      password: ${SPRING_DATA_REDIS_PASSWORD:}

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

# 自定义配置
app:
  jwt:
    secret: ${JWT_SECRET:change-this-to-a-long-random-secret-key-at-least-32-bytes}
    expire-minutes: ${JWT_EXPIRE_MINUTES:1440}
  # 字段加密密钥:独立于 JWT 密钥(未配置时回退到 JWT 密钥以兼容旧部署)
  crypto:
    secret: ${CRYPTO_SECRET:${JWT_SECRET:change-this-to-a-long-random-secret-key-at-least-32-bytes}}
  # 跨域允许来源(逗号分隔);默认 * 放开,生产建议收敛为具体前端域名
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:*}
  ai-service:
    url: ${AI_SERVICE_URL:http://localhost:8000}
    # 后端↔AI 服务的内部共享密钥(为空时 AI 服务不强制校验,便于本地开发)
    internal-key: ${INTERNAL_API_KEY:}

# Knife4j 接口文档
springdoc:
  swagger-ui:
    path: /doc.html
knife4j:
  enable: true

management:
  endpoints:
    web:
      exposure:
        include: health,info
